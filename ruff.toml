target-version = "py313"
line-length = 120
exclude = [".venv", "__pycache__", ".ruff_cache", ".pytest_cache", "app/alembic/versions"]

[lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "C4", "DTZ", "T10", "RUF"]
ignore = [
    "E501",   # line length 由 formatter 處理
    "RUF001", # 全形字元在 string（中文文檔常見）
    "RUF002", # 全形字元在 docstring
    "RUF003", # 全形字元在 comment（用戶慣用繁中註解）
]

[lint.isort]
known-first-party = ["app", "tests"]
